name: Release

on:
  push:
    tags:
      - "v*" # Trigger on pushes to tags starting with 'v'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack yarn install --frozen-lockfile
      - run: scripts/release.sh firefox
      - run: scripts/release.sh chrome
      - name: Prepare Friendly Release Files
        run: |
          mkdir -p release/friendly
          cp release/qr-lite-*-chrome-release.zip release/friendly/qr-lite-chrome.zip
          cp release/qr-lite-*-firefox-release.zip release/friendly/qr-lite-firefox.zip
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-release
          path: release/qr-lite-*-firefox-*.zip # Upload the generated Firefox zip files
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-release
          path: release/qr-lite-*-chrome-*.zip # Upload the generated Chrome zip files

      # Create a GitHub Release

      - name: Create GitHub Release
        run: |
          TAG="${{ github.ref_name }}"

          PRERELEASE=false
          shopt -s nocasematch
          if [[ "$TAG" == *"rc"* || "$TAG" == *"beta"* || "$TAG" == *"alpha"* ]]; then
            PRERELEASE=true
          fi
          shopt -u nocasematch

          cat > release-notes.txt <<EOF
          Download the file that matches your browser:

          - Brave / Chrome / Edge: \`qr-lite-chrome.zip\`
          - Firefox: \`qr-lite-firefox.zip\`

          Install in Brave / Chrome / Edge:

          1. Download \`qr-lite-chrome.zip\`
          2. Extract the ZIP to a folder
          3. Open \`brave://extensions\` or \`chrome://extensions\`
          4. Enable Developer mode
          5. Click Load unpacked
          6. Select the extracted folder

          The other ZIP files are the original build and source archives.
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists; uploading assets instead."
            gh release upload "$TAG" \
              --clobber \
              release/friendly/qr-lite-chrome.zip \
              release/friendly/qr-lite-firefox.zip \
              release/qr-lite-*-firefox-*.zip \
              release/qr-lite-*-chrome-*.zip
            gh release edit "$TAG" --notes-file release-notes.txt
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --draft=false \
              --prerelease="$PRERELEASE" \
              --notes-file release-notes.txt \
              release/friendly/qr-lite-chrome.zip \
              release/friendly/qr-lite-firefox.zip \
              release/qr-lite-*-firefox-*.zip \
              release/qr-lite-*-chrome-*.zip
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
